name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set UP JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: ./mvnw -B verify
        
      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
